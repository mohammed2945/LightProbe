services:
  postgres:
    profiles: !override
      - local-postgres

  cloud-sql-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.23.0
    command:
      - --address=0.0.0.0
      - --port=5432
      - --health-check
      - ${CLOUD_SQL_INSTANCE_CONNECTION_NAME:?set CLOUD_SQL_INSTANCE_CONNECTION_NAME}
    networks:
      - app
    restart: unless-stopped

  broker:
    environment:
      DATABASE_URL: postgres://${CLOUD_SQL_USER:-liveprobe}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@cloud-sql-proxy:5432/${CLOUD_SQL_DATABASE:-liveprobe}
      LIVEPROBE_DB_POOL_SIZE: ${LIVEPROBE_DB_POOL_SIZE:-10}
    depends_on: !override
      cloud-sql-proxy:
        condition: service_started
