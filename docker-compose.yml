x-service-defaults: &service-defaults
  env_file:
    - .env
  environment: &service-environment
    GATEWAY_URL: http://gateway:8000
    MATCHING_URL: http://matching:8000
    PRICING_URL: http://pricing:8000
    LOCATION_URL: http://location:8000
    TRIPS_URL: http://trips:8000
    PAYMENTS_URL: http://payments:8000
  restart: unless-stopped
  healthcheck:
    test:
      - CMD
      - python
      - -c
      - >-
        import urllib.request;
        urllib.request.urlopen("http://localhost:8000/healthz", timeout=1)
    interval: 5s
    timeout: 2s
    retries: 5

services:
  gateway:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      matching:
        condition: service_healthy
      pricing:
        condition: service_healthy
      trips:
        condition: service_healthy

  matching:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/matching/Dockerfile
    ports:
      - "8001:8000"
    depends_on:
      location:
        condition: service_healthy

  pricing:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/pricing/Dockerfile
    ports:
      - "8002:8000"

  location:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/location/Dockerfile
    ports:
      - "8003:8000"

  trips:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/trips/Dockerfile
    ports:
      - "8004:8000"
    depends_on:
      payments:
        condition: service_healthy

  payments:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/payments/Dockerfile
    ports:
      - "8005:8000"

  world:
    <<: *service-defaults
    build:
      context: .
      dockerfile: world/Dockerfile
    ports:
      - "8006:8000"
    depends_on:
      location:
        condition: service_healthy
      trips:
        condition: service_healthy

  ridersim:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/ridersim/Dockerfile
    ports:
      - "8007:8000"
    depends_on:
      gateway:
        condition: service_healthy
      world:
        condition: service_healthy

  stub_agent:
    <<: *service-defaults
    profiles:
      - emergency-agent
    build:
      context: .
      dockerfile: ops/Dockerfile.stub_agent
    ports:
      - "8009:8000"
    depends_on:
      gateway:
        condition: service_healthy
      trips:
        condition: service_healthy

  liveprobe:
    <<: *service-defaults
    profiles:
      - agent
    build:
      context: .
      dockerfile: liveprobe/Dockerfile
    ports:
      - "8008:8000"
    depends_on:
      gateway:
        condition: service_healthy
      location:
        condition: service_healthy
      trips:
        condition: service_healthy
